name: Deploy via FTP

# Publica o site no servidor a cada push na branch main.
on:
  push:
    branches: [main]
  workflow_dispatch:        # permite rodar manualmente pela aba Actions

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Enviar arquivos via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          server-dir: ${{ secrets.FTP_PATH }}
          protocol: ftp
          port: 21
          local-dir: ./
          # Não enviar arquivos de infraestrutura para o servidor.
          # (git/.github são excluídos por padrão via **/.git*)
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .deploy/**
            .githooks/**
            sftp/**
