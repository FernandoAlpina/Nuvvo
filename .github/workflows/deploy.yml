name: Deploy via FTP (site estático — DESATIVADO)

# ATENÇÃO: gatilho automático DESATIVADO.
# O ambiente nuvvo.alpdev.com.br passou a rodar WordPress em /public_html.
# Este workflow publicava o SITE ESTÁTICO em /public_html (secrets.FTP_PATH) e,
# se disparado, SOBRESCREVERIA o WordPress. Mantido apenas como execução manual
# (workflow_dispatch) para eventual rollback do estático — use com cuidado.
on:
  workflow_dispatch:        # somente manual, pela aba Actions

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Enviar arquivos via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          server-dir: ${{ secrets.FTP_PATH }}
          protocol: ftp
          port: 21
          local-dir: ./
          # Não enviar arquivos de infraestrutura para o servidor.
          # (git/.github são excluídos por padrão via **/.git*)
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .deploy/**
            .githooks/**
            sftp/**
